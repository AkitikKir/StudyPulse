name: Android Debug APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Inject google-services.json from secret
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "Missing secret GOOGLE_SERVICES_JSON"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Inject GROQ_API_KEY into Gradle properties
        run: |
          if [ -z "$GROQ_API_KEY" ]; then
            echo "Missing secret GROQ_API_KEY"
            exit 1
          fi
          mkdir -p ~/.gradle
          printf '\nGROQ_API_KEY=%s\n' "$GROQ_API_KEY" >> ~/.gradle/gradle.properties

      - name: Build debug APK
        run: gradle :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: studypulse-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
